name: build-windows

# Builds the showdown-ui Electron app as a Windows NSIS installer, asserts the .exe exists, and runs a
# PS_SMOKE launch smoke on the unpacked app so a broken WebSocket tap (injected.js not shipped) fails
# CI rather than shipping. On Windows the GUI app detaches from the console, so we gate on the process
# exit code (PS_SMOKE exits 1 when injected.js is missing) instead of grepping stdout.
on:
  push:
    branches: [main]
    paths:
      - 'showdown-ui/**'
      - 'helper/extension/lib/**'
      - 'helper/extension/data/moves.json'
      - '.github/workflows/build-windows.yml'
  pull_request:
    paths:
      - 'showdown-ui/**'
      - 'helper/extension/lib/**'
      - 'helper/extension/data/moves.json'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch: # allow on-demand runs (gives the badge a run on demand)

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: showdown-ui/package-lock.json

      - name: Install showdown-ui deps
        run: cd showdown-ui && npm ci

      - name: Build NSIS installer
        run: cd showdown-ui && npm run dist:win

      - name: Assert installer artifact exists and is a real PE binary
        shell: pwsh
        run: |
          $files = Get-ChildItem showdown-ui/dist/*.exe -ErrorAction SilentlyContinue
          if (-not $files) { Write-Error 'No .exe produced'; exit 1 }
          $files | ForEach-Object { Write-Host $_.FullName $_.Length }
          if (($files | Where-Object { $_.Length -gt 0 }).Count -eq 0) { Write-Error 'installer is empty'; exit 1 }
          # Beyond non-empty: confirm the first two bytes are the PE "MZ" magic, so a truncated or
          # wrong-type file that still has a non-zero size can't pass as a valid installer.
          $bytes = [System.IO.File]::ReadAllBytes($files[0].FullName)[0..1]
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) { Write-Error 'installer is not a PE (MZ) binary'; exit 1 }

      - name: Launch smoke (PS_SMOKE — proves the WebSocket tap source ships)
        shell: pwsh
        run: |
          $bin = "showdown-ui/dist/win-unpacked/Pokemon Showdown Battle UI.exe"
          if (-not (Test-Path $bin)) { Write-Error 'No unpacked .exe found'; exit 1 }
          $env:PS_SMOKE = '1'
          $p = Start-Process -FilePath $bin -PassThru -Wait
          if ($p.ExitCode -ne 0) { Write-Error "PS_SMOKE exited $($p.ExitCode) — injected.js missing, battle-help would be broken"; exit 1 }

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ps-local-windows-installer
          path: showdown-ui/dist/*.exe
          if-no-files-found: error
