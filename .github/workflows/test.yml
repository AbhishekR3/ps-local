name: test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # gitleaks scans full history

      # Secret scan FIRST — fail fast before anything else if a credential ever leaks.
      # Free for public repos (no license env needed).
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # No root package-lock.json exists, so setup-node's default lockfile search fails with
          # "Dependencies lock file is not found". Point it at the lockfiles that actually drive
          # installs (app + the heavy vendor submodule) so the npm cache keys on real deps.
          cache-dependency-path: |
            app/package-lock.json
            vendor/pokemon-showdown/package-lock.json

      - name: Install helper deps
        run: cd helper && npm install

      # Fast gate: the standalone smoke (exits non-zero on failure, unlike the old inline
      # console.assert) plus the full helper unit suite (parser/exporter/golden/edge cases).
      - name: Protocol smoke test
        run: npm run test:smoke

      - name: Run helper unit + golden + edge tests
        run: cd helper && node --test
