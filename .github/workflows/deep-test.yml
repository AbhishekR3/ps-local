name: deep-test

# Heavyweight suite for major changes — runs on demand and nightly, NOT on every push/PR.
# (The fast `test` workflow covers per-PR smoke + unit + golden + edge cases.)
# Runs a full server build on top of the helper suite to prove PS still compiles.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC nightly

jobs:
  build-and-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            app/package-lock.json
            vendor/pokemon-showdown/package-lock.json

      - name: Install helper deps
        run: cd helper && npm install

      - name: Run helper unit + golden + edge tests
        run: cd helper && node --test

      - name: Protocol smoke
        run: npm run test:smoke

      - name: Build server (proves it still compiles after an upstream bump)
        run: cd vendor/pokemon-showdown && npm ci && npm run build
