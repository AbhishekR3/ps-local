name: codacy

# Code-quality scan. The Codacy GitHub App analyzes pushes server-side (dashboard + grade badge);
# this workflow additionally runs the Codacy Analysis CLI and feeds results into GitHub's Security →
# Code scanning tab as SARIF. It is informational — it does NOT fail the build on findings
# (max-allowed-issues is maxed), so it can be tightened into a gate later. No Codacy token required.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codacy-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d43360362776a6789b47b99ae8973510854e2d3d  # master
        with:
          # Respects .codacy.yaml (excludes vendor/ etc.). Emit GitHub-compatible SARIF and never
          # fail the job on issue count — this stage is advisory.
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # The CLI emits one SARIF run per tool (eslint, pmd, trivy, …) into a single file. Since
      # GitHub's 2025-07-22 change, upload-sarif rejects multiple runs that share a category, so we
      # stamp each run with a distinct automationDetails.id (the category) before uploading.
      - name: Give each SARIF run a distinct category
        run: |
          jq 'reduce range(0; (.runs|length)) as $i
                (.; .runs[$i].automationDetails.id =
                  ("codacy/" + (.runs[$i].tool.driver.name // "tool") + "-" + ($i|tostring) + "/"))' \
            results.sarif > results.fixed.sarif

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          sarif_file: results.fixed.sarif
