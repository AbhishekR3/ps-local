name: codacy

# Code-quality scan. The Codacy GitHub App analyzes pushes server-side (dashboard + grade badge);
# this workflow additionally runs the Codacy Analysis CLI and feeds results into GitHub's Security →
# Code scanning tab as SARIF. It is informational — it does NOT fail the build on findings
# (max-allowed-issues is maxed), so it can be tightened into a gate later. No Codacy token required.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codacy-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d43360362776a6789b47b99ae8973510854e2d3d  # master
        with:
          # Respects .codacy.yaml (excludes vendor/ etc.). Emit GitHub-compatible SARIF and never
          # fail the job on issue count — this stage is advisory.
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # GitHub Code Scanning rejects SARIF with >20 runs in a single upload. Codacy can produce
      # 26+ runs (one per tool × directory). We split the combined file into individual per-run
      # files and upload each separately with a distinct category to stay under the limit.
      - name: Split SARIF into one file per run
        run: |
          mkdir -p sarif-runs
          count=$(jq '.runs | length' results.sarif)
          for i in $(seq 0 $((count - 1))); do
            tool=$(jq -r ".runs[$i].tool.driver.name // \"tool\"" results.sarif)
            jq --argjson i "$i" --arg cat "codacy/${tool}-${i}/" \
              '{version, "$schema": .["$schema"],
                runs: [.runs[$i] + {automationDetails: {id: $cat}}]}' \
              results.sarif > "sarif-runs/run-${i}.sarif"
          done

      - name: Upload SARIF runs to GitHub code scanning
        run: |
          for f in sarif-runs/run-*.sarif; do
            echo "Uploading $f …"
            cat_id=$(jq -r '.runs[0].automationDetails.id // "codacy"' "$f")
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/${{ github.repository }}/code-scanning/sarifs \
              -f commit_sha=${{ github.sha }} \
              -f ref=${{ github.ref }} \
              -f sarif="$(gzip -c "$f" | base64 -w0)" \
              -f tool_name="codacy" \
              -f category="$cat_id" || true   # non-fatal: advisory only
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
