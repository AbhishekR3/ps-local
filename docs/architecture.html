<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ps-local · Architecture Reference</title>
<style>
:root{--bg:#0f1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--orange:#ffa657;--code-bg:#161b22}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:16px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
#logo{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap}
#search{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 12px;font-size:13px;outline:none;max-width:480px}
#search:focus{border-color:var(--accent)}
#clearbtn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 10px;cursor:pointer;font-size:12px}
#homebtn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 12px;cursor:pointer;font-size:12px;margin-left:auto}
#layout{display:flex;flex:1;overflow:hidden}
#gpanel{width:38%;min-width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg)}
#gsvg{flex:1;width:100%;cursor:grab}
#gsvg:active{cursor:grabbing}
#legend{padding:6px 10px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid var(--border);background:var(--bg2)}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.ld{width:9px;height:9px;border-radius:50%}
#cpanel{flex:1;overflow-y:auto;padding:20px 24px}
#cpanel::-webkit-scrollbar{width:6px}
#cpanel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.asec{margin-bottom:20px}
details{border:1px solid var(--border);border-radius:8px;overflow:hidden}
summary{padding:10px 16px;background:var(--bg2);cursor:pointer;font-size:13px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:8px;list-style:none;user-select:none}
summary::before{content:'▶';font-size:9px;transition:transform .15s;display:inline-block;color:var(--text2)}
details[open] summary::before{transform:rotate(90deg)}
summary:hover{background:var(--bg3)}
.sb{padding:16px;background:var(--bg)}
pre,code{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:12px}
pre{background:var(--code-bg);border:1px solid var(--border);border-radius:6px;padding:12px;overflow-x:auto;line-height:1.6;margin:8px 0;white-space:pre}
code{background:var(--code-bg);border-radius:3px;padding:2px 5px;color:var(--orange)}
table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
th{background:var(--bg2);padding:7px 10px;text-align:left;font-weight:600;border:1px solid var(--border);color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
td{padding:6px 10px;border:1px solid var(--border);vertical-align:top;line-height:1.5;color:var(--text2)}
tr:hover td{background:var(--bg2)}
.fc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px}
.fc h4{font-size:12px;font-family:'SF Mono',monospace;color:var(--accent);margin-bottom:6px}
.fc p{color:var(--text2);line-height:1.5;font-size:12px;margin-bottom:5px}
.tag{display:inline-block;background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 7px;font-size:11px;font-family:monospace;margin:2px}
.tag.g{color:var(--green)}.tag.o{color:var(--orange)}.tag.p{color:var(--purple)}.tag.a{color:var(--accent)}
#nd{display:none;max-width:860px}
.ndback{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:5px 12px;cursor:pointer;font-size:12px;margin-bottom:18px}
.ndback:hover{color:var(--text);background:var(--bg3)}
.ndtitle{font-size:19px;font-family:'SF Mono',monospace;color:var(--accent);margin-bottom:3px}
.ndpath{color:var(--text2);font-size:11px;font-family:monospace;margin-bottom:18px}
.nds{margin-bottom:16px}
.nds h3{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-bottom:7px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.nds p{line-height:1.6;color:var(--text);font-size:13px}
.fnentry{border-left:3px solid var(--border);padding:7px 12px;margin-bottom:7px;background:var(--bg2);border-radius:0 5px 5px 0}
.fnentry:hover{border-left-color:var(--accent)}
.fnname{font-family:monospace;color:var(--green);font-size:12px;margin-bottom:3px}
.fndesc{color:var(--text2);font-size:12px;line-height:1.5}
.kp{background:var(--bg2);border-left:3px solid var(--accent);padding:9px 13px;margin:9px 0;border-radius:0 5px 5px 0;font-size:12px;line-height:1.5;color:var(--text)}
.wb{background:rgba(210,153,34,.1);border-left:3px solid var(--yellow);padding:9px 13px;margin:9px 0;border-radius:0 5px 5px 0;font-size:12px;color:var(--text);line-height:1.5}
.db{background:rgba(248,81,73,.1);border-left:3px solid var(--red);padding:9px 13px;margin:9px 0;border-radius:0 5px 5px 0;font-size:12px;color:var(--text);line-height:1.5}
.rh{color:var(--red)}.rm{color:var(--yellow)}.rl{color:var(--green)}
h1{font-size:20px;color:var(--text);margin-bottom:10px}
h2{font-size:16px;color:var(--text);margin-bottom:8px;margin-top:18px}
h3{font-size:13px;color:var(--accent);margin-bottom:7px;margin-top:14px}
p{line-height:1.6;margin-bottom:9px;color:var(--text2);font-size:13px}
ul,ol{padding-left:18px;margin-bottom:9px}
li{line-height:1.6;color:var(--text2);margin-bottom:3px;font-size:13px}
strong{color:var(--text)}
.fl{font-family:'SF Mono',monospace;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px;margin:10px 0;font-size:11px;line-height:1.9;overflow-x:auto;white-space:pre;color:var(--text2)}
#tooltip{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:11px;pointer-events:none;z-index:1000;display:none;max-width:220px;line-height:1.5;color:var(--text)}
</style>
</head>
<body>
<div id="topbar">
  <span id="logo">⚡ ps-local</span>
  <span style="color:var(--border)">|</span>
  <span style="color:var(--text2);font-size:11px">Architecture Reference</span>
  <input type="text" id="search" placeholder="Search files, functions, concepts…" oninput="handleSearch(this.value)">
  <button id="clearbtn" onclick="clearSearch()">✕</button>
  <button id="homebtn" onclick="showHome()">☰ All Sections</button>
</div>
<div id="layout">
  <div id="gpanel"><svg id="gsvg"></svg><div id="legend"></div></div>
  <div id="cpanel"><div id="hv"></div><div id="nd"></div></div>
</div>
<div id="tooltip"></div>

{id:'lookup',label:'lookup.js',file:'helper/extension/lib/lookup.js',layer:'lib',lines:278,

's1':`<h2>1. Executive Summary</h2>
<p><strong>ps-local</strong> is a Pokemon Showdown Battle Helper — a real-time competitive battle analysis tool that runs alongside the live Pokemon Showdown client. It shows you opponent set predictions, stat ranges, move frequencies, and ability/item probabilities during a battle, and automatically archives every battle as a rich log file.</p>
<p>The system has <strong>two production surfaces</strong> that share an identical pure-function core:</p>
<ul>
<li><strong>showdown-ui/</strong> — A native Electron + React + TypeScript app (<code>npm start</code>). The primary surface. Wraps <code>play.pokemonshowdown.com</code> in a native window with a docked battle helper panel on the right. This is what most users run.</li>
<li><strong>helper/extension/</strong> — A Chrome MV3 browser extension. Injects a helper panel into the PS web client as a side panel overlay.</li>
</ul>
<p><strong>Architecture style:</strong> Layered event-driven. A WebSocket tap feeds raw frames up through a stateful parser into a pure rendering layer. The Electron main process handles persistence; the renderer handles display. Both surfaces use identical shared libraries.</p>
<div class="kp"><strong>Core loop:</strong> PS WebSocket → injected.js tap → SockJS decode → postMessage → IPC relay → BattleTracker.feed() → renderBattle() → HTML update</div>
<h3>Key Technologies</h3>
<table><tr><th>Layer</th><th>Technology</th><th>Version</th></tr>
<tr><td>Desktop app</td><td>Electron</td><td>42.x</td></tr>
<tr><td>Build</td><td>electron-vite</td><td>2.x</td></tr>
<tr><td>UI</td><td>React + TypeScript</td><td>18.x / 5.x</td></tr>
<tr><td>Extension</td><td>Chrome MV3</td><td>—</td></tr>
<tr><td>Packaging</td><td>electron-builder</td><td>25.x</td></tr>
<tr><td>Tests</td><td>Node built-in test runner</td><td>≥22.6</td></tr>
<tr><td>Linting</td><td>ESLint flat config</td><td>9.x</td></tr>
</table>`,

's5':`<h2>5. Dependency Graph</h2>
<p>The interactive graph on the left shows directed dependencies. Click any node for full detail. Key structural observations:</p>
<ul>
<li><strong>parser.js</strong> is the most-depended-upon module (3 consumers: main-ts, HelperPanel, panel.js) and has zero dependencies of its own.</li>
<li><strong>render.js</strong> is the second most critical: it is the single shared source of all UI HTML. Forking it would immediately create a rendering divergence.</li>
<li><strong>injected.js</strong> is uniquely cross-context: it runs in three different execution environments (Chrome extension MAIN world, Electron psView via ps.ts, Electron window via app/preload.js).</li>
<li><strong>The adapter layer</strong> (render.ts, data.ts) is intentionally thin — it exists only to bridge the Vite/Electron build environment to the pure shared libs.</li>
<li><strong>No circular dependencies</strong> exist in the shared lib graph: parser ← exporter, render → lookup → toid. The dependency direction is always toward more-primitive modules.</li>
</ul>
<div class="wb">render.js and lookup.js must remain dependency-free of chrome.* and Node-only APIs. They are imported by both browser and Node contexts simultaneously — coupling to either breaks the other.</div>`,

's6':`<h2>6. Execution Flow Analysis</h2>
<h3>A. Application Startup (showdown-ui)</h3>
<div class="fl">app.whenReady()
  └→ loadMovesData()                    // reads moves.json from REPO_ROOT or resourcesPath
      └→ loadConfig()                   // reads config.json: timezone, logLevel, saveLogs
          └→ createWindow()
              ├→ new BrowserWindow()    // mainWindow: React renderer
              │   └ preload: preload/index.ts (contextBridge → window.psUI)
              ├→ new WebContentsView()  // psView: PS client overlay
              │   └ preload: preload/ps.ts (WS tap + drag relay)
              │   └ loadURL('https://play.pokemonshowdown.com')
              ├→ installAdBlock(psView.webContents.session)
              ├→ Register all ipcMain handlers (ps-frame, get-buffer, set-game-bounds, …)
              └→ mainWindow.loadURL(MAIN_URL)  // loads React app

  app.on('ready') also starts:
  └→ setInterval(sweepStaleRooms, 5min).unref()</div>

<h3>B. ps-frame Pipeline (the hot path)</h3>
<div class="fl">PS Server ──SockJS──→ psView WebSocket
  │
  injected.js (PatchedWebSocket.onmessage)
    ├ decodeSockJS(raw)          // parse a[...] frame → string[]
    └ for each msg starting with >battle-:
        window.postMessage({__psHelper:true, data:msg}, origin)
  │
  ps.ts preload (message listener)
    └ ipcRenderer.send('ps-frame', {data})
  │
  index.ts main (ipcMain.on 'ps-frame')
    ├ bufferFrame(data)          // push to buffers[roomid], cap at MAX_FRAMES, cap rooms at MAX_ROOMS
    ├ handleFrame(data)
    │   ├ roomidOf(data)         // extract >battle-xxx-yyy from first line
    │   ├ rooms.get(room) or create {tracker:new BattleTracker(), rawFrames:[], lastSeen:now}
    │   ├ tracker.feed(data)     // state mutation (BattleTracker._handleLine × N)
    │   ├ rawFrames.push(data), lastSeen = now
    │   └ if state.ended or (state.closed and turn≥1):
    │       writeLog(roomid, state, rawFrames)
    │         ├ generateBattleLog(state, rawFrames, movesData, timezone)  // → rich string
    │         ├ sanitize(p1), sanitize(p2)
    │         └ writeFileSync(path.join(LOGS_DIR, filename+'.txt'), rich)
    └ mainWindow.webContents.send('ps-frame', {data})
  │
  preload/index.ts (ipcRenderer.on 'ps-frame')
    └ window.psUI callbacks: cb({data})
  │
  HelperPanel.tsx (onFrame)
    ├ tracker.feed(data)
    ├ room change detection → resync()
    ├ stall timer rearm
    └ if !rafRef: requestAnimationFrame(doRender); rafRef=true
  │
  doRender()
    ├ await ensureFormat()       // lazy-load format tables if needed
    ├ renderBattle(state,core,fmt) → {format, html}
    └ setHtml(html), setFormat(format)</div>

<h3>C. Panel Resync Flow</h3>
<div class="fl">resync() [triggered by: resyncSignal prop change, room change, stall detection]
  ├ tracker.reset()
  ├ framesSeenRef = 0, autoResyncedRef = false
  ├ const {frames, room} = await window.psUI.getBuffer()
  │     └→ ipcMain.handle('get-buffer')
  │           └→ return {frames: buffers[mostRecentRoom], room}
  └ for each frame: onFrame({data: frame})
        └→ tracker.feed(frame) → normal render pipeline</div>

<h3>D. Drag-Resize Flow</h3>
<div class="fl">User drags divider in renderer (Battle.tsx onMouseDown)
  ├ window.psUI.beginResize()
  │     └→ ipcMain.on('begin-resize')
  │           ├ psView mouse events → relay mode
  │           └ psView.webContents.send('start-drag-relay')
  │                 └→ ps.ts: attach mousemove/mouseup listeners
  │
  User moves mouse over psView (PS client area)
  ├ ps.ts mousemove: ipcRenderer.send('ps-drag-move', {screenX})
  │     └→ ipcMain.on('ps-drag-move')
  │           └→ mainWindow.webContents.send('resize-drag', {x: screenX})
  │                 └→ preload/index.ts: onResizeDrag cb(x)
  │                       └→ Battle.tsx: update divider position CSS
  │
  User releases mouse
  ├ ps.ts mouseup: ipcRenderer.send('ps-drag-end')
  │     └→ ipcMain.on('ps-drag-end')
  │           └→ mainWindow.webContents.send('resize-drag-end')
  └ window.psUI.endResize() → cleanup</div>`,

's7':`<h2>7. Important Functions &amp; Classes</h2>
<div class="fnentry"><div class="fnname">1. BattleTracker.feed(frame) — helper/extension/lib/parser.js</div><div class="fndesc">The core state machine entry point. Consumes every raw PS protocol frame. Auto-resets on room change. Dispatches 40+ command types. Called from three consumers simultaneously. Return value is the current state snapshot.</div></div>
<div class="fnentry"><div class="fnname">2. handleFrame(frameData) — showdown-ui/electron/main/index.ts</div><div class="fndesc">The hottest path in the app. Buffers display frames, feeds BattleTracker, detects |win|/|tie|/|deinit| end conditions, triggers writeLog. Every battle frame flows through here.</div></div>
<div class="fnentry"><div class="fnname">3. renderBattle(state,core,fmt,opts) — helper/extension/lib/render.js</div><div class="fndesc">Top-level HTML generator. Three code paths: spectator (both sides), player (your vs opponent), waiting. Single source of truth for all battle UI in both surfaces.</div></div>
<div class="fnentry"><div class="fnname">4. generateBattleLog(state,rawFrames,movesData,timezone) — helper/extension/lib/exporter.js</div><div class="fndesc">Synchronous archive writer. Produces 7-section battle record. Called on every completed battle. The output is what users actually keep and share.</div></div>
<div class="fnentry"><div class="fnname">5. getBreakdown(species,data,revealedMoves) — helper/extension/lib/lookup.js</div><div class="fndesc">Core prediction engine. Narrows possible sets, computes Monte Carlo distributions for items/abilities/teras. Called once per opponent Pokemon per render pass.</div></div>
<div class="fnentry"><div class="fnname">6. PatchedWebSocket(url,protocols) — helper/extension/injected.js</div><div class="fndesc">Wraps window.WebSocket to intercept SockJS frames before PS captures them. The tap that makes everything else possible. Runs in MAIN world in three different contexts.</div></div>
<div class="fnentry"><div class="fnname">7. flushAllRooms(reason) — showdown-ui/electron/main/index.ts</div><div class="fndesc">Crash-resilience function. Wired to 4 exit events (before-quit, window-all-closed, render-process-gone, uncaughtException). Ensures no battle is ever lost on unexpected exit.</div></div>
<div class="fnentry"><div class="fnname">8. BattleTracker._handleLine(line) — helper/extension/lib/parser.js</div><div class="fndesc">Giant dispatch switch on PS protocol command. Implements the full PS battle protocol client-side. Understanding this function means understanding the PS protocol.</div></div>
<div class="fnentry"><div class="fnname">9. BattleTracker._onRequest(json) — helper/extension/lib/parser.js</div><div class="fndesc">Parses the |request| message (the only frame that contains full team data). Populates myTeam[] with stats, moves, ability, item, tera. The only source of ground-truth player data.</div></div>
<div class="fnentry"><div class="fnname">10. HelperPanel.onFrame(payload) — showdown-ui/src/components/HelperPanel.tsx</div><div class="fndesc">Frame receiver in the renderer. Feeds tracker, arms stall detection, schedules RAF coalescing render. The renderer-side hot path.</div></div>
<div class="fnentry"><div class="fnname">11. breakdownCard(species,reveal,core,fmt,meta,activeHp) — helper/extension/lib/render.js</div><div class="fndesc">The main opponent Pokemon card builder. Renders stat range bars, predicted sets with move frequencies, item/ability/tera predictions. Most visually complex output.</div></div>
<div class="fnentry"><div class="fnname">12. sweepStaleRooms() — showdown-ui/electron/main/index.ts</div><div class="fndesc">Memory management. Evicts rooms idle for >30 min to prevent unbounded growth in long sessions. Runs every 5 min. Writes INPROGRESS log for evicted rooms.</div></div>
<div class="fnentry"><div class="fnname">13. installAdBlock(session) — showdown-ui/electron/main/index.ts + app/main.js</div><div class="fndesc">Registers onBeforeRequest handler cancelling 80+ ad/analytics domains at the session layer. Must never cancel *.pokemonshowdown.com, sim*.psim.us, or action.php.</div></div>
<div class="fnentry"><div class="fnname">14. decodeSockJS(raw) — helper/extension/injected.js</div><div class="fndesc">Parses SockJS a[...] frames into PS protocol messages. Returns [] for control frames. The framing assumption here is the single most fragile contract with upstream.</div></div>
<div class="fnentry"><div class="fnname">15. createWindow() — showdown-ui/electron/main/index.ts</div><div class="fndesc">Bootstraps the full dual-pane window: BrowserWindow (React) + WebContentsView (PS client). Sets up all IPC handlers. Called once per app lifecycle.</div></div>
<div class="fnentry"><div class="fnname">16. writeLog(roomid,state,rawFrames) — showdown-ui/electron/main/index.ts</div><div class="fndesc">Produces the filename (encodes result, player names, timestamp) and writes the generated log. The SPEC_ prefix is applied here when state.mySide===null.</div></div>
<div class="fnentry"><div class="fnname">17. HelperPanel.resync() — showdown-ui/src/components/HelperPanel.tsx</div><div class="fndesc">Full tracker rebuild from buffer. The recovery mechanism for missed frames, mid-battle mounts, and manual user-triggered re-syncs.</div></div>
<div class="fnentry"><div class="fnname">18. BattleTracker._reveal(side,species,extra) — helper/extension/lib/parser.js</div><div class="fndesc">Accumulates opponent knowledge. Merges ability/item/move sets across multiple reveals of the same species. Core of the knowledge-tracking system.</div></div>
<div class="fnentry"><div class="fnname">19. largestRemainderPct(entries,grand) — helper/extension/lib/lookup.js</div><div class="fndesc">Hamilton method for integer percentage distribution summing to exactly 100. Prevents "101%" display bugs in prediction panels.</div></div>
<div class="fnentry"><div class="fnname">20. runSynthetic() — app/main.js</div><div class="fndesc">Headless mode: feeds a fixture battle file through the real C5 log path with no window or server. PS_SYNTHETIC=1 triggers this path. NOTE: no CI workflow invokes it; the real CI decoupling gate is npm run test:smoke (helper/test/smoke.mjs).</div></div>
<div class="fnentry"><div class="fnname">21. content.js frameHandler(event) — helper/extension/content.js</div><div class="fndesc">Cross-world bridge. Receives frames from injected.js (MAIN world), routes to background.js (all rooms) and panel iframe (current room only). The event.source check MUST NOT be added.</div></div>
<div class="fnentry"><div class="fnname">22. background.js handleFrame(data) — helper/extension/background.js</div><div class="fndesc">Extension-side frame buffer. Maintains per-room circular buffer (2000 frames max, 6 rooms max LRU). Persists to storage.session with 500ms debounce.</div></div>
<div class="fnentry"><div class="fnname">23. parseDetails(str) — helper/extension/lib/parser.js</div><div class="fndesc">Parses PS "details" strings into structured Pokemon identity data. Called on every switch/drag/replace event to identify the Pokemon entering battle.</div></div>
<div class="fnentry"><div class="fnname">24. statRangeBar(label,lo,hi,max) — helper/extension/lib/render.js</div><div class="fndesc">Renders the stat uncertainty visualization: solid bar to lo, translucent extension to hi. The visual representation of "we know it's somewhere in this range."</div></div>
<div class="fnentry"><div class="fnname">25. Battle.tsx ResizeObserver callback — showdown-ui/src/routes/Battle.tsx</div><div class="fndesc">Reports game container pixel bounds to main via setGameBounds IPC on every resize. The glue that keeps the psView overlay aligned with its React placeholder div.</div></div>`,

's8':`<h2>8. Data Flow Mapping</h2>
<h3>A. Live Battle Display</h3>
<div class="fl">ENTRY:  PS WebSocket SockJS frames (raw binary via TCP/TLS)
        │
        injected.js: decodeSockJS → array of PS protocol strings
        │
        content.js / ps.ts: validation + routing (filter >battle- prefix)
        │
PARSE:  BattleTracker.feed(frame)
        │  state.active    — currently active Pokemon (slot → identity + HP + boosts)
        │  state.revealed  — observed opponent info (species → moves/ability/item sets)
        │  state.myTeam    — player's own team (from |request|)
        │  state.turn      — current turn number
        │  state.ended     — has |win|/|tie| been seen
        │
PREDICT:getBreakdown(species, formatData, revealedMoves)
        │  Narrows sets → relevantSets
        │  Computes item/ability/tera distributions via Monte Carlo
        │  Returns breakdown.predictedItems, .predictedAbilities, .predictedTeras
        │
RENDER: renderBattle(state, core, fmt) → HTML string
        │  breakdownCard()  — opponent cards (predictions + stat ranges)
        │  myActiveCard()   — player's active (actual stats from |request|)
        │  statRangeBar()   — lo/hi uncertainty visualization
        │  moveChip()       — move buttons (type, BP, frequency %)
        │
OUTPUT: dangerouslySetInnerHTML / $content.innerHTML = html</div>

<h3>B. Battle Log Archive</h3>
<div class="fl">ENTRY:  Battle ends (|win| / |tie| / |deinit| / stale-eviction)
        │
        state = BattleTracker.state   (accumulated over entire battle)
        rawFrames = string[]          (all frames as received, verbatim)
        movesData = moves.json        (type/category/BP lookup)
        │
GENERATE: generateBattleLog(state, rawFrames, movesData, timezone)
        │  Section 1: SUMMARY (result, format, date, players)
        │  Section 2: YOUR TEAM (from myTeam[], full stats + moves)
        │  Section 3: OPPONENT TEAM (from revealed{}, observed data only)
        │  Section 4: FIELD STATE AT END (weather, terrain, side conditions)
        │  Section 5: TURN-BY-TURN (rendered via renderTurn() per turn)
        │  Section 6: RAW PROTOCOL (rawFrames joined, verbatim)
        │
PERSIST: fs.writeFileSync(logs/battle_info/<filename>.txt)
         filename: <roomid>_[SPEC_]<p1>_vs_<p2>_<WIN|TIE|INPROGRESS>_<ts>.txt</div>

<h3>C. Static Data Loading</h3>
<div class="fl">Build time:  helper/build-data.js  (slow Monte-Carlo, run manually after upstream update)
               └→ queries vendor/pokemon-showdown format data
               └→ writes helper/extension/data/**/*.json
               └→ these JSONs are FROZEN ARTIFACTS in the repo

Runtime (Electron):  data.ts loadFormat(key)
               └→ import.meta.glob matches helper/extension/data/gen9/*.json
               └→ Vite bundles these at build time into the renderer chunk
               └→ packaged app reads from asar (inline bundle)

Runtime (Extension):  data.js loadSets(key)
               └→ fetch(chrome.runtime.getURL('data/gen9/sets.json'))
               └→ Chrome serves from extension's local file system</div>`,

's9':`<h2>9. Storage &amp; Persistence</h2>
<h3>Battle Log Files (Primary Output)</h3>
<div class="fc"><h4>logs/battle_info/*.txt</h4>
<p><strong>Location:</strong> Dev: &lt;repo&gt;/logs/battle_info/ | Packaged: ~/Documents/ps-local/logs/battle_info/</p>
<p><strong>Naming convention:</strong></p>
<pre>Own games:    &lt;roomid&gt;_&lt;p1&gt;_vs_&lt;p2&gt;_WIN_&lt;ts&gt;.txt
              &lt;roomid&gt;_&lt;p1&gt;_vs_&lt;p2&gt;_LOSS_&lt;ts&gt;.txt
              &lt;roomid&gt;_&lt;p1&gt;_vs_&lt;p2&gt;_TIE_&lt;ts&gt;.txt
Spectator:    &lt;roomid&gt;_SPEC_&lt;p1&gt;_vs_&lt;p2&gt;_WIN_&lt;ts&gt;.txt
In-progress:  &lt;roomid&gt;_&lt;p1&gt;_vs_&lt;p2&gt;_INPROGRESS_&lt;ts&gt;.txt</pre>
<p><strong>Contents:</strong> 7 sections (SUMMARY, YOUR TEAM, OPPONENT TEAM, FIELD STATE, TURN-BY-TURN, RAW PROTOCOL)</p>
<p><strong>Written by:</strong> showdown-ui/electron/main/index.ts writeLog() (primary) and app/main.js writeLog() (legacy)</p></div>

<h3>Debug Logs</h3>
<div class="fc"><h4>logs/debug/*.log</h4>
<p><strong>Location:</strong> Dev: &lt;repo&gt;/logs/debug/ | Packaged: ~/Documents/ps-local/logs/debug/</p>
<p><strong>Files:</strong> app-&lt;ts&gt;.log (app/ runtime), showdown-ui-&lt;ts&gt;.log (showdown-ui runtime), &lt;script&gt;-&lt;ts&gt;.log (orchestration scripts)</p>
<p><strong>Format (C7):</strong> <code>2024-01-15T10:23:45.123Z [INFO] [ui-main] Battle ended: gen9randombattle-123</code></p>
<p><strong>Level threshold:</strong> PS_LOG_LEVEL env var (DEBUG/INFO/WARN/ERROR)</p></div>

<h3>Extension Frame Buffer (Ephemeral)</h3>
<div class="fc"><h4>chrome.storage.session (background.js)</h4>
<p><strong>Scope:</strong> Chrome browser session — lost on browser close, persists across service worker restarts</p>
<p><strong>Contents:</strong> Map&lt;roomid, string[]&gt; — up to 2000 frames per room, up to 6 rooms</p>
<p><strong>Purpose:</strong> Replay frames when panel is opened mid-battle or after service worker restart</p>
<p><strong>Risk:</strong> 500ms persist debounce — last 500ms of frames can be lost on hard worker kill</p></div>

<h3>Electron Frame Buffer (In-Memory)</h3>
<div class="fc"><h4>buffers Map (showdown-ui/electron/main/index.ts)</h4>
<p><strong>Scope:</strong> Process lifetime — lost on app exit (after flushAllRooms writes logs)</p>
<p><strong>Contents:</strong> Map&lt;roomid, string[]&gt; — max MAX_FRAMES (2000) per room, max MAX_ROOMS (6)</p>
<p><strong>Purpose:</strong> Replay frames to renderer on mount or resync via get-buffer IPC</p></div>

<h3>Config File</h3>
<div class="fc"><h4>config.json</h4>
<p><strong>Location:</strong> Dev: &lt;repo&gt;/config.json | Packaged: ~/Documents/ps-local/config.json</p>
<p><strong>Schema:</strong></p>
<pre>{ "timezone": "UTC", "logLevel": "INFO", "saveLogs": true }</pre>
<p><strong>Overrides:</strong> PS_TIMEZONE and PS_LOG_LEVEL env vars override the file values</p></div>

<h3>Static Data Bundle</h3>
<div class="fc"><h4>helper/extension/data/**/*.json</h4>
<p><strong>Status:</strong> Frozen build artifact — committed to repo, not generated at runtime</p>
<p><strong>Regenerate:</strong> <code>cd vendor/pokemon-showdown &amp;&amp; npm run build &amp;&amp; cd ../.. &amp;&amp; cd helper &amp;&amp; node build-data.js</code></p>
<p><strong>Requires:</strong> Node ≥22.6 (TypeScript type-stripping), upstream PS build data in dist/</p>
<p><strong>Staleness:</strong> No automatic staleness detection — must manually rebuild after upstream PS data changes</p></div>`,

's12':`<h2>12. Developer Knowledge Guide</h2>
<h3>Where should new features go?</h3>
<table><tr><th>Feature Type</th><th>Where to Add</th><th>Notes</th></tr>
<tr><td>New battle UI element (stat, badge, card)</td><td>helper/extension/lib/render.js</td><td>Both surfaces get it automatically. Update panel.css AND global.css with matching styles.</td></tr>
<tr><td>New protocol command handling</td><td>helper/extension/lib/parser.js _handleLine()</td><td>Add a new case. Update state shape if needed. Add tests in helper/test/parser.test.js.</td></tr>
<tr><td>New log section or format</td><td>helper/extension/lib/exporter.js</td><td>generateBattleLog() is the single writer. Update golden test (helper/test/golden.test.js --update).</td></tr>
<tr><td>New Electron window UI (toolbar button, dialog)</td><td>showdown-ui/src/App.tsx or Battle.tsx</td><td>Wire new IPC channels in preload/index.ts and main/index.ts.</td></tr>
<tr><td>New main-process feature</td><td>showdown-ui/electron/main/index.ts</td><td>Add ipcMain.handle or ipcMain.on. Expose via contextBridge in preload/index.ts if renderer needs it.</td></tr>
<tr><td>New prediction data</td><td>helper/build-data.js + data.js + data.ts</td><td>Add a new JSON file, loader function in both data.js and data.ts, and consume in lookup.js or render.js.</td></tr>
</table>

<h3>How are tests organized?</h3>
<p>Tests live in <code>helper/test/</code> and run with <code>npm test</code> (= <code>cd helper &amp;&amp; node --test</code>). Requires Node ≥18. No external test framework — uses Node's built-in <code>assert</code> module.</p>
<ul>
<li><strong>parser.test.js</strong> — feed raw protocol frames through BattleTracker, assert state mutations</li>
<li><strong>render.test.js</strong> — call renderBattle with mock state, assert HTML output contains expected elements</li>
<li><strong>golden.test.js</strong> — run full pipeline on sample-battle.txt, compare output byte-for-byte. Update: <code>node golden.test.js --update</code></li>
<li><strong>lookup.test.js</strong> — test set narrowing and Monte Carlo predictions with known inputs</li>
<li><strong>edge-cases.test.js</strong> — tie battles, forfeits, INPROGRESS scenarios</li>
</ul>

<h3>How to add a new IPC channel?</h3>
<ol>
<li>Add <code>ipcMain.handle('my-channel', async (e, args) =&gt; { ... })</code> in index.ts createWindow()</li>
<li>Add <code>window.psUI.myMethod = (args) =&gt; ipcRenderer.invoke('my-channel', args)</code> in preload/index.ts</li>
<li>Call <code>window.psUI.myMethod(args)</code> in any React component</li>
</ol>

<h3>How to update upstream PS data?</h3>
<pre>npm run update-upstream          # bumps submodules, rebuilds, re-applies overlays
cd vendor/pokemon-showdown &amp;&amp; npm run build &amp;&amp; cd ../..
cd helper &amp;&amp; node build-data.js  # regenerates data/*.json (slow, Monte-Carlo)</pre>
<p>If helper tests fail after an upstream bump, a PS protocol change broke parser.js or exporter.js. See docs/UPDATE-WORKFLOW.md.</p>

<h3>How does packaging work?</h3>
<p><code>npm run dist:ui</code> → <code>electron-vite build</code> (produces out/) → <code>electron-builder</code> (produces dist/). On macOS: unsigned dmg (right-click → Open, or <code>xattr -dr com.apple.quarantine</code>). The key path fork: <code>app.isPackaged</code> switches reads from repo root to <code>process.resourcesPath</code> (for moves.json) and <code>~/Documents/ps-local/</code> (for logs + config).</p>`,

's13':`<h2>13. Risk Assessment</h2>
<table><tr><th>Risk</th><th>Severity</th><th>Description</th><th>Mitigation</th></tr>
<tr><td>Duplicate ad-block list</td><td class="rm">Medium</td><td>AD_ANALYTICS_PATTERNS is copy-pasted between index.ts and app/main.js. They can silently diverge. A domain cancelled in one but not the other leaks ads in one surface.</td><td>Comment in each file references the other. Any ad-block update must be applied to both. Consider a future shared file if CJS/ESM boundary is resolved.</td></tr>
<tr><td>Stale render.js CSS sync</td><td class="rm">Medium</td><td>panel.css (extension) and src/styles/global.css (Electron) are separate copies. Adding a CSS class to render.js HTML without updating both files silently breaks one surface's styling.</td><td>Manual sync discipline. Any new CSS class added to render.js HTML must be added to both CSS files. CLAUDE.md documents this invariant.</td></tr>
<tr><td>SockJS framing assumption</td><td class="rm">High → mitigated</td><td>injected.js assumes PS uses SockJS a[...] framing (unversioned). If PS changes WebSocket transport or frame format, the tap produces nothing.</td><td>Now surfaced on BOTH surfaces: showdown-ui shows "Tap not active" on its status line when the tap fails to install (ps.ts), and the extension panel now shows a "Battle data unavailable" banner when injected.js reports a dead socket / changed framing (A2/I3, routed injected.js→content.js→panel.js). Weekly upstream-canary CI still detects protocol breaks; the 15s diagnostic warning remains.</td></tr>
<tr><td>content.js postMessage source check</td><td class="rh">High</td><td>Adding event.source===window to frameHandler in content.js silently drops ALL frames — MAIN→ISOLATED cross-world delivery uses a different window proxy. This gotcha is not obvious and the failure mode is invisible (blank panel, no error).</td><td>Documented in CLAUDE.md and inline comments. Code review gate.</td></tr>
<tr><td>MV3 service worker lifetime</td><td class="rm">Medium</td><td>Chrome may kill background.js at any time. The 500ms debounce on storage.session persist means up to 500ms of frames can be lost in the window between a new frame arriving and the persist completing.</td><td>Debounce window is intentionally short (500ms). storage.session rehydration on restart recovers most history. True loss only in hard kills.</td></tr>
<tr><td>app.isPackaged path fork complexity</td><td class="rl">Low</td><td>index.ts branches on app.isPackaged for every path (moves.json from resourcesPath vs repo root; logs to ~/Documents/ vs repo root). If any future file access misses the branch, it silently reads/writes the wrong location in packaged builds.</td><td>The isPackaged pattern is centralized in early initialization. All path resolution in loadMovesData() and logFile() uses the same pattern.</td></tr>
<tr><td>No shared CSS source</td><td class="rm">Medium</td><td>panel.css and global.css are parallel copies. Neither is generated from the other. Divergence accumulates over time as features are added.</td><td>Only mitigation is discipline + code review. A build step that generates both from a shared source would eliminate this risk entirely.</td></tr>
<tr><td>build-data.js Node version requirement</td><td class="rl">Low</td><td>Requires Node ≥22.6 for TypeScript type-stripping. Older Node fails with a syntax error that doesn't clearly indicate a version requirement.</td><td>CLAUDE.md documents this. setup.js performs a version check before running. Error message could be improved.</td></tr>
<tr><td>Only most-recent room in renderer</td><td class="rl">Low</td><td>HelperPanel tracks only the most recently active room. Main process correctly handles concurrent rooms for logging, but the helper panel only shows one at a time. Users in multiple battles see only the latest.</td><td>Documented as intentional design gap. Main process logs are correct for all rooms. UI limitation only.</td></tr>
<tr><td>Unsigned macOS builds</td><td class="rl">Low</td><td>macOS users must right-click → Open or run xattr -dr to bypass Gatekeeper. This is a friction point for distribution.</td><td>Documented in README and packaging progress docs. Apple Developer ID signing would require a paid membership.</td></tr>
</table>`,

's14':`<h2>14. Suggested Reading Order</h2>
<p>For a new engineer who wants to understand this codebase as quickly as possible:</p>
<ol>
<li><strong>CLAUDE.md</strong> (repo root) — Read the entire file. It is the authoritative developer guide. The "invariant" and "undocumented assumptions" sections are especially critical.</li>
<li><strong>helper/extension/injected.js</strong> (77 lines) — This is where it all begins. Understand how the WebSocket tap works before anything else. Small file, huge impact.</li>
<li><strong>helper/extension/lib/parser.js</strong> — Read emptyState() to understand the full state shape, then read feed() and _handleLine(). This is the state machine that everything depends on.</li>
<li><strong>showdown-ui/electron/main/index.ts</strong> — Read handleFrame(), writeLog(), and createWindow(). This is the primary app entry point and the C5 log path in one place.</li>
<li><strong>showdown-ui/electron/preload/ps.ts</strong> (72 lines) — Read the frame relay and drag relay. Short file that bridges two execution contexts.</li>
<li><strong>showdown-ui/electron/preload/index.ts</strong> (45 lines) — Read the full contextBridge API. This is the renderer-main security boundary.</li>
<li><strong>showdown-ui/src/components/HelperPanel.tsx</strong> — Read onFrame(), doRender(), and resync(). This is the renderer-side hot path and the most complex React component.</li>
<li><strong>helper/extension/lib/render.js</strong> — Read renderBattle() entry point, then breakdownCard() and statRangeBar(). This is the full UI renderer.</li>
<li><strong>helper/extension/lib/lookup.js</strong> — Read getBreakdown() and largestRemainderPct(). This is the prediction engine.</li>
<li><strong>helper/extension/lib/exporter.js</strong> — Read generateBattleLog() and renderTurn(). This produces the archived battle files.</li>
<li><strong>helper/test/parser.test.js</strong> — Run the test suite and read the tests. They demonstrate the exact behavior of the state machine with concrete examples.</li>
<li><strong>helper/extension/content.js</strong> — Read frameHandler() and injectPanel(). Now you understand the extension surface.</li>
</ol>`,

's15':`<h2>15. Final Architecture Summary</h2>
<h3>Most Critical Files (Must Understand Before Any PR)</h3>
<ol>
<li>helper/extension/lib/parser.js — the state machine</li>
<li>showdown-ui/electron/main/index.ts — the main process</li>
<li>helper/extension/injected.js — the WebSocket tap</li>
<li>helper/extension/lib/render.js — the shared renderer</li>
<li>showdown-ui/src/components/HelperPanel.tsx — the React UI</li>
</ol>

<h3>Critical Execution Paths</h3>
<ul>
<li><strong>Hot path:</strong> injected.js → ps.ts → index.ts handleFrame() → BattleTracker.feed() → mainWindow.send → HelperPanel.onFrame() → doRender() → renderBattle() → DOM update</li>
<li><strong>Log-write path:</strong> handleFrame() detects end condition → writeLog() → generateBattleLog() → fs.writeFileSync()</li>
<li><strong>Resync path:</strong> resync() → tracker.reset() → getBuffer() IPC → replay frames → onFrame() loop</li>
<li><strong>Crash-resilience path:</strong> before-quit/uncaughtException → flushAllRooms() → writeLog(INPROGRESS) × N rooms</li>
</ul>

<h3>Architectural Strengths</h3>
<ul>
<li><strong>Pure shared core:</strong> parser.js, exporter.js, render.js, lookup.js have zero dependencies on chrome or Node APIs. Both surfaces share identical business logic with no forking.</li>
<li><strong>Zero-config data loading:</strong> Vite import.meta.glob bundles all JSONs at build time. No runtime file discovery needed.</li>
<li><strong>Crash resilience:</strong> Four exit paths all call flushAllRooms(). No battle log is lost unless the OS kills the process mid-write.</li>
<li><strong>Coalesced rendering:</strong> rAF coalescing prevents DOM thrashing during frame bursts (10s/ms during an active turn).</li>
<li><strong>Layered IPC security:</strong> contextBridge enforces that only explicitly exposed window.psUI methods reach the renderer.</li>
</ul>

<h3>Architectural Weaknesses</h3>
<ul>
<li><strong>Duplicate CSS:</strong> panel.css and global.css must be kept in sync manually. No build step enforces this.</li>
<li><strong>Duplicate ad-block list:</strong> index.ts and app/main.js both maintain AD_ANALYTICS_PATTERNS. Divergence is not detected.</li>
<li><strong>Single-room renderer:</strong> HelperPanel only shows the most-recently-active room. Main process correctly logs all concurrent rooms.</li>
<li><strong>Frozen data bundle:</strong> No automatic staleness detection for data/*.json after upstream PS changes. Must manually rebuild.</li>
<li><strong>Unsigned macOS:</strong> Distribution friction — users must bypass Gatekeeper manually.</li>
</ul>`,

's16':`<h2>16. Gotchas &amp; Non-Obvious Behaviors</h2>
<div class="db"><strong>1. Do NOT add event.source===window in content.js frameHandler()</strong><br>
MAIN→ISOLATED cross-world postMessage delivery uses a different window proxy object. The check silently drops every frame. The failure mode is a completely blank helper panel with no error message. This is the #1 trap for new developers touching the extension.</div>
<div class="db"><strong>2. Do NOT post to '*' in injected.js</strong><br>
injected.js posts {__psHelper, data} to window.location.origin, not '*'. Changing this to '*' is a security regression — it allows any cross-origin iframe to intercept battle frame data.</div>
<div class="wb"><strong>3. ELECTRON_RUN_AS_NODE=1 is set in this shell</strong><br>
This environment variable forces Electron to run as plain Node — breaking app/. To run app/: <code>env -u ELECTRON_RUN_AS_NODE ./node_modules/.bin/electron .</code>. showdown-ui's <code>npm start</code> (electron-vite) handles this correctly and is unaffected.</div>
<div class="wb"><strong>4. render.ts adapter — do not add rendering logic here</strong><br>
render.ts only sets opts.assetBase. Any rendering feature added here is invisible to the Chrome extension panel. Always add to render.js.</div>
<div class="wb"><strong>5. panel.css and global.css must be manually kept in sync</strong><br>
They are separate copies. Adding a CSS class to render.js HTML without updating both files causes the extension panel to have un-styled elements while the Electron panel looks correct (or vice versa).</div>
<div class="wb"><strong>6. parser.js, exporter.js, render.js, lookup.js — zero dependencies always</strong><br>
Adding any chrome.* or Node-only import (fs, path, require) to these files breaks the other consumer. They must remain importable in both browser extension context AND Node/Electron main process. ESM only, no CommonJS.</div>
<div class="wb"><strong>7. The 15-second no-sim-socket diagnostic is normal during non-battle browsing</strong><br>
injected.js warns in the console after 15s if no sim socket is seen. This fires on every non-battle PS page (lobby, user profile, etc.). It is informational only, not an error.</div>
<div class="wb"><strong>8. The stall-detection timer fires exactly once per mount</strong><br>
The autoResyncedRef flag prevents infinite resync loops. If the stall timer fires and resync() is called but frames still don't contain |init|/|request|, the component stays stuck. This can happen in very unusual mid-battle disconnect scenarios.</div>
<div class="wb"><strong>9. BattleTracker is never re-constructed in HelperPanel — only reset()</strong><br>
trackerRef.current is created once and persists for the component lifetime. This is intentional: React re-renders must not create new tracker instances. Constructing a new BattleTracker is wrong; call tracker.reset() instead.</div>
<div class="wb"><strong>10. app.isPackaged changes ALL path roots</strong><br>
In dev: moves.json from &lt;repo&gt;/helper/extension/data/, logs/config to &lt;repo&gt;/logs|config.json. In packaged: moves.json from process.resourcesPath, logs/config to ~/Documents/ps-local/. Any new file access must handle both cases.</div>
<div class="wb"><strong>11. content.js polls URL every 700ms for room changes</strong><br>
PS routes battles via History API — the URL may change without a page navigation. The 700ms poll is how content.js detects room switches. This means there's up to a 700ms delay before the panel switches to a new battle room.</div>
<div class="wb"><strong>12. manifest.json localhost ports must match injected.js</strong><br>
injected.js taps :8000 AND :8080. manifest.json host_permissions, matches, and web_accessible_resources must grant both ports. If they diverge, the extension injects on the wrong port and sees nothing.</div>
<div class="wb"><strong>13. background.js storage.session is Chrome-only</strong><br>
The code null-guards storage.session access for non-Chrome browsers. Without it, the frame buffer does not survive service worker restarts — all replay history is lost on every worker restart.</div>
<div class="wb"><strong>14. Testclient-old.html, not testclient-new.html</strong><br>
In local mode, app/ loads testclient-old.html. testclient-new.html exists in the client submodule but does not connect even standalone — do not switch to it.</div>
<div class="wb"><strong>15. The "Port 8000 EADDRINUSE" warning in local mode is harmless</strong><br>
When app/ spawns the PS server, multiple worker processes race to bind :8000. Worker 1 wins; extras fail with EADDRINUSE. This appears in the logs and looks alarming but is expected behavior from PS's multi-worker server architecture.</div>
<div class="wb"><strong>16. build-data.js requires Node ≥22.6 for TypeScript type-stripping</strong><br>
Older Node fails with a syntax error on .ts imports. The error message does not clearly indicate a Node version issue. setup.js performs a version check, but if you run build-data.js directly without setup.js, the version check is skipped.</div>
<div class="wb"><strong>17. Only battle rooms are forwarded by injected.js</strong><br>
injected.js only posts frames starting with &gt;battle- to the page. Non-battle rooms (lobby, chat, team builder) are silently dropped. The parser also validates the roomid format on the first line.</div>`
};

// ═══════════════════════════════════════════════════════════════════
// FORCE GRAPH ENGINE
// ═══════════════════════════════════════════════════════════════════
class ForceGraph {
  constructor(svgEl, nodes, edges) {
    this.svg = svgEl;
    this.W = svgEl.clientWidth || 700;
    this.H = svgEl.clientHeight || 500;
    this.nodeMap = {};
    this.selected = null;
    this.searchQ = '';
    this.alpha = 1;
    this.alphaDecay = 0.018;
    this.vDecay = 0.38;
    this.panX = 0; this.panY = 0; this.scale = 1;
    this.isPanning = false; this.panStart = null;

    const cx = this.W / 2, cy = this.H / 2;
    this.nodes = nodes.map((n, i) => {
      const a = (i / nodes.length) * 2 * Math.PI;
      const r = Math.min(this.W, this.H) * 0.32;
      const nd = {...n, x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), vx:0, vy:0, fx:null, fy:null};
      this.nodeMap[n.id] = nd;
      return nd;
    });
    this.edges = edges.map(e => ({...e, src: this.nodeMap[e.s], tgt: this.nodeMap[e.t]})).filter(e => e.src && e.tgt);

    this.setupSVG();
    this.setupInteraction();
    this.tick();
  }

  setupSVG() {
    const svg = this.svg;
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');

    // Arrow marker
    const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
    const mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
    mk.setAttribute('id','arr'); mk.setAttribute('markerWidth','8'); mk.setAttribute('markerHeight','8');
    mk.setAttribute('refX','12'); mk.setAttribute('refY','3'); mk.setAttribute('orient','auto');
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M0,0 L0,6 L8,3 z'); path.setAttribute('fill','#444c56');
    mk.appendChild(path); defs.appendChild(mk); svg.appendChild(defs);

    // Clip
    const clip = document.createElementNS('http://www.w3.org/2000/svg','clipPath');
    clip.setAttribute('id','gc');
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('width','100%'); rect.setAttribute('height','100%');
    clip.appendChild(rect); defs.appendChild(clip);

    this.g = document.createElementNS('http://www.w3.org/2000/svg','g');
    this.g.setAttribute('clip-path','url(#gc)');
    svg.appendChild(this.g);

    this.linkG = document.createElementNS('http://www.w3.org/2000/svg','g'); this.g.appendChild(this.linkG);
    this.nodeG = document.createElementNS('http://www.w3.org/2000/svg','g'); this.g.appendChild(this.nodeG);
    this.labelG = document.createElementNS('http://www.w3.org/2000/svg','g'); this.g.appendChild(this.labelG);

    // Draw edges
    this.linkEls = this.edges.map(e => {
      const p = document.createElementNS('http://www.w3.org/2000/svg','line');
      p.setAttribute('stroke','#30363d'); p.setAttribute('stroke-width','1.2');
      p.setAttribute('stroke-opacity','0.55'); p.setAttribute('marker-end','url(#arr)');
      this.linkG.appendChild(p);
      return p;
    });

    // Draw nodes
    this.nodeEls = this.nodes.map(n => {
      const color = LAYERS[n.layer]?.color || '#666';
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('cursor','pointer');
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('r', n.file ? '16' : '13');
      c.setAttribute('fill', color);
      c.setAttribute('fill-opacity','0.85');
      c.setAttribute('stroke', color);
      c.setAttribute('stroke-width','2');
      g.appendChild(c);
      this.nodeG.appendChild(g);

      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('text-anchor','middle');
      t.setAttribute('dominant-baseline','middle');
      t.setAttribute('dy','28');
      t.setAttribute('font-size','9');
      t.setAttribute('fill','#8b949e');
      t.setAttribute('pointer-events','none');
      t.textContent = n.label;
      this.labelG.appendChild(t);

      // Events
      g.addEventListener('mouseenter', (ev) => this.onHover(n, ev));
      g.addEventListener('mouseleave', () => this.onLeave());
      g.addEventListener('click', (ev) => { ev.stopPropagation(); this.onNodeClick(n); });

      // Drag
      let dragging = false, ox, oy;
      g.addEventListener('mousedown', ev => {
        ev.stopPropagation();
        dragging = true; ox = ev.clientX - n.x; oy = ev.clientY - n.y;
        n.fx = n.x; n.fy = n.y; this.alpha = Math.max(this.alpha, 0.3);
      });
      window.addEventListener('mousemove', ev => {
        if (!dragging) return;
        n.fx = (ev.clientX - ox); n.fy = (ev.clientY - oy);
        n.x = n.fx; n.y = n.fy;
      });
      window.addEventListener('mouseup', () => {
        if (!dragging) return; dragging = false; n.fx = null; n.fy = null;
      });

      return {g, c, t};
    });
  }

  setupInteraction() {
    const svg = this.svg;
    // Pan
    svg.addEventListener('mousedown', ev => {
      if (ev.target !== svg && ev.target !== this.g) return;
      this.isPanning = true; this.panStart = [ev.clientX - this.panX, ev.clientY - this.panY];
    });
    window.addEventListener('mousemove', ev => {
      if (!this.isPanning) return;
      this.panX = ev.clientX - this.panStart[0]; this.panY = ev.clientY - this.panStart[1];
      this.g.setAttribute('transform', `translate(${this.panX},${this.panY}) scale(${this.scale})`);
    });
    window.addEventListener('mouseup', () => { this.isPanning = false; });
    // Zoom
    svg.addEventListener('wheel', ev => {
      ev.preventDefault();
      const delta = ev.deltaY > 0 ? 0.9 : 1.1;
      this.scale = Math.max(0.3, Math.min(3, this.scale * delta));
      this.g.setAttribute('transform', `translate(${this.panX},${this.panY}) scale(${this.scale})`);
    }, {passive: false});
  }

  applyForces() {
    const {nodes, edges, W, H} = this;
    for (const n of nodes) { n.ax = 0; n.ay = 0; }

    // Repulsion
    const q = 4500;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        const d2 = dx*dx + dy*dy || 1;
        const d = Math.sqrt(d2);
        if (d < 0.5) { dx = (Math.random()-0.5); dy = (Math.random()-0.5); }
        const f = q / d2;
        const fx = f * dx/d, fy = f * dy/d;
        a.ax -= fx; a.ay -= fy;
        b.ax += fx; b.ay += fy;
      }
    }

    // Spring
    const ls = 0.28, rest = 130;
    for (const e of edges) {
      const a = e.src, b = e.tgt;
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = ls * (d - rest);
      const fx = f * dx/d, fy = f * dy/d;
      a.ax += fx; a.ay += fy;
      b.ax -= fx; b.ay -= fy;
    }

    // Center gravity
    const g = 0.04;
    for (const n of nodes) {
      n.ax += g * (W/2 - n.x);
      n.ay += g * (H/2 - n.y);
    }
  }

  tick() {
    if (this.alpha > 0.005) {
      this.applyForces();
      const a = this.alpha, vd = 1 - this.vDecay;
      for (const n of this.nodes) {
        if (n.fx !== null) { n.x = n.fx; n.vx = 0; }
        else { n.vx = (n.vx + n.ax * a) * vd; n.x = Math.max(20, Math.min(this.W-20, n.x + n.vx)); }
        if (n.fy !== null) { n.y = n.fy; n.vy = 0; }
        else { n.vy = (n.vy + n.ay * a) * vd; n.y = Math.max(20, Math.min(this.H-20, n.y + n.vy)); }
      }
      this.alpha -= this.alphaDecay;
    }
    this.render();
    requestAnimationFrame(() => this.tick());
  }

  render() {
    const sq = this.searchQ;
    this.edges.forEach((e, i) => {
      const el = this.linkEls[i];
      const r = 14;
      const dx = e.tgt.x - e.src.x, dy = e.tgt.y - e.src.y;
      const d = Math.sqrt(dx*dx+dy*dy)||1;
      el.setAttribute('x1', e.src.x); el.setAttribute('y1', e.src.y);
      el.setAttribute('x2', e.tgt.x - dx/d*r); el.setAttribute('y2', e.tgt.y - dy/d*r);
    });

    this.nodes.forEach((n, i) => {
      const {g, c, t} = this.nodeEls[i];
      g.setAttribute('transform', `translate(${n.x},${n.y})`);
      t.setAttribute('x', n.x); t.setAttribute('y', n.y);

      const sel = this.selected === n.id;
      const dim = sq && !n.label.toLowerCase().includes(sq) && !(n.file||'').toLowerCase().includes(sq) && !(n.desc||'').toLowerCase().includes(sq);
      g.style.opacity = dim ? '0.15' : '1';
      c.setAttribute('stroke-width', sel ? '3.5' : '2');
      c.setAttribute('filter', sel ? 'drop-shadow(0 0 6px '+LAYERS[n.layer]?.color+')' : '');
    });
  }

  onHover(n, ev) {
    const tt = document.getElementById('tooltip');
    tt.innerHTML = `<strong style="color:${LAYERS[n.layer]?.color}">${n.label}</strong><br><span style="color:#8b949e;font-size:10px">${n.file || n.layer}</span><br>${(n.desc||'').slice(0,100)}…`;
    tt.style.display = 'block';
    tt.style.left = (ev.clientX+12)+'px'; tt.style.top = (ev.clientY-10)+'px';
  }
  onLeave() { document.getElementById('tooltip').style.display='none'; }

  onNodeClick(n) {
    this.selected = n.id;
    showNodeDetail(n);
  }

  setSearch(q) { this.searchQ = q.toLowerCase(); }
  reheat() { this.alpha = Math.max(this.alpha, 0.3); }
}

// ═══════════════════════════════════════════════════════════════════
// PAGE LOGIC
// ═══════════════════════════════════════════════════════════════════
let graph;

function showHome() {
  document.getElementById('nd').style.display='none';
  document.getElementById('hv').style.display='';
  if(graph) graph.selected=null;
}

function showNodeDetail(n) {
  document.getElementById('hv').style.display='none';
  const nd = document.getElementById('nd');
  nd.style.display='';
  const color = LAYERS[n.layer]?.color || '#aaa';
  const callsHtml = (n.calls||[]).map(c=>`<span class="tag a">${c}</span>`).join('');
  const calledByHtml = (n.calledBy||[]).map(c=>`<span class="tag o">${c}</span>`).join('');
  const exportsHtml = (n.exports||[]).map(c=>`<span class="tag g">${c}</span>`).join('');
  const fnsHtml = (n.fns||[]).map(f=>`<div class="fnentry"><div class="fnname">${f.n}</div><div class="fndesc">${f.d}</div></div>`).join('');
  nd.innerHTML = `
    <button class="ndback" onclick="showHome()">← All Sections</button>
    <div class="ndtitle" style="color:${color}">${n.label}</div>
    <div class="ndpath">${n.file || '(external / runtime)'}${n.lines ? ' · ' + n.lines + ' lines' : ''} · <span style="color:${color}">${LAYERS[n.layer]?.label}</span></div>
    <div class="nds"><h3>Purpose</h3><p>${n.desc||''}</p></div>
    ${exportsHtml ? `<div class="nds"><h3>Exports</h3><div class="tag-list">${exportsHtml}</div></div>` : ''}
    ${calledByHtml ? `<div class="nds"><h3>Called By</h3><div class="tag-list">${calledByHtml}</div></div>` : ''}
    ${callsHtml ? `<div class="nds"><h3>Calls / Imports</h3><div class="tag-list">${callsHtml}</div></div>` : ''}
    ${fnsHtml ? `<div class="nds"><h3>Key Functions</h3>${fnsHtml}</div>` : ''}
    ${n.notes ? `<div class="nds"><h3>Notes &amp; Gotchas</h3><div class="kp">${n.notes}</div></div>` : ''}
  `;
  nd.scrollTop = 0;
  document.getElementById('cpanel').scrollTop = 0;
}

function handleSearch(q) {
  if(graph) graph.setSearch(q);
  // Also scroll to first matching section heading in home view
  if (!q) return;
  const ql = q.toLowerCase();
  const summaries = document.querySelectorAll('#hv summary');
  for (const s of summaries) {
    if (s.textContent.toLowerCase().includes(ql)) {
      s.scrollIntoView({behavior:'smooth', block:'start'});
      break;
    }
  }
}

function clearSearch() {
  document.getElementById('search').value='';
  handleSearch('');
}

// Build home sections
function buildHome() {
  const hv = document.getElementById('hv');
  const sectionTitles = {
    s1:'1. Executive Summary', s2:'2. Repository Structure Map', s3:'3. System Architecture',
    s4:'4. File Interaction Map', s5:'5. Dependency Graph', s6:'6. Execution Flow Analysis',
    s7:'7. Important Functions & Classes', s8:'8. Data Flow Mapping', s9:'9. Storage & Persistence',
    s10:'10. External Dependencies', s11:'11. Configuration & Environment',
    s12:'12. Developer Knowledge Guide', s13:'13. Risk Assessment', s14:'14. Suggested Reading Order',
    s15:'15. Final Architecture Summary', s16:'16. Gotchas & Non-Obvious Behaviors'
  };
  hv.innerHTML = '';
  for (const [k, title] of Object.entries(sectionTitles)) {
    const sec = document.createElement('div'); sec.className='asec';
    const det = document.createElement('details'); det.open = (k==='s1'||k==='s2');
    const sum = document.createElement('summary'); sum.textContent = title;
    const body = document.createElement('div'); body.className='sb'; body.innerHTML = SECTIONS[k]||'';
    det.appendChild(sum); det.appendChild(body); sec.appendChild(det); hv.appendChild(sec);
  }
}

// Build legend
function buildLegend() {
  const leg = document.getElementById('legend');
  for (const [k, l] of Object.entries(LAYERS)) {
    leg.innerHTML += `<div class="li"><div class="ld" style="background:${l.color}"></div><span>${l.label}</span></div>`;
  }
}

// Init
window.addEventListener('load', () => {
  buildHome();
  buildLegend();
  const svg = document.getElementById('gsvg');
  graph = new ForceGraph(svg, NODES, EDGES);
});
</script>
