appId: com.abhishekr3.ps-local
productName: Pokemon Showdown Battle UI
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# moves.json is read by the main process from process.resourcesPath when packaged
# (electron/main/index.ts → DATA_DIR). The `to:` tail must match loadMovesData()'s join.
# injected.js is the WebSocket tap; the ps preload reads it from process.resourcesPath when packaged
# (electron/preload/ps.ts). The `to:` tail must match that candidate path.
extraResources:
  - from: ../helper/extension/data/moves.json
    to: helper/extension/data/moves.json
  - from: ../helper/extension/injected.js
    to: helper/extension/injected.js
asar: true
linux:
  target: [AppImage, tar.gz]
  category: Game
  icon: build/icon.png
win:
  target: [nsis, portable]
  icon: build/icon.png
mac:
  target: [dmg, zip]
  category: public.app-category.games
  icon: build/icon.png
